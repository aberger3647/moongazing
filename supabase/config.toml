
[functions.send-moon-alerts]
enabled = true
verify_jwt = false  # Allow execution without JWT
import_map = "./functions/send-moon-alerts/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-moon-alerts/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-moon-alerts/*.html" ]

# Public token-authenticated endpoints: reached from email links and the manage
# page with no JWT, so they must be invocable without one (the token is the credential).
[functions.manage-alerts]
verify_jwt = false

[functions.unsubscribe]
verify_jwt = false

[functions.unsubscribe-alert]
verify_jwt = false

[functions.unsubscribe-all-alerts]
verify_jwt = false
